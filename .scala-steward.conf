# Scala compiler/stdlib versions are managed BY HAND — stay on the 3.3 LTS line and bump 3.3.x
# manually. Scala Steward cannot be made to hold the LTS any other way:
#   - updates.pin (version="3.3.") does NOT work: Steward "unifies" the LTS up to the Scala 3 Next
#     version already present in the build (it bumped 3.3.8 -> 3.8.4 despite the pin).
#   - per-artifact updates.ignore leaks: listing scala3-library_sjs1 misses the actual tracked
#     artifact scala3-library_sjs1_3 (platform + binary suffix), so a PR slips through (hearth#297).
# Ignoring the whole org.scala-lang group is the only reliable block.
updates.ignore = [
  { groupId = "org.scala-lang" }
]
pullRequests.grouping = [
  { name = "scala-versions", title = "Scala compiler updates", filter = [{ group = "org.scala-lang" }, { group = "org.scoverage" }] }
]
